name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    # Skip the release commit itself to avoid an infinite loop
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v4.1.0

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Check for user-facing changes
        id: check
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi
          COUNT=$(git log "$RANGE" --pretty=format:"%s" | grep -cE "^(feat|fix)(\(.+\))?!?:" || true)
          echo "releasable=$( [ "$COUNT" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Bump version and tag
        if: steps.check.outputs.releasable == 'true'
        run: pnpm release

      - name: Push commit and tag
        if: steps.check.outputs.releasable == 'true'
        run: git push --follow-tags
